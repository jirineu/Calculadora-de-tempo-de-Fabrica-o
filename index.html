<!-- index.html -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Criador de Listas</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <header class="topo">
      <h1>Criador de Listas</h1>
      <p>Crie colunas e adicione dados em linhas.</p>
    </header>

    <!-- Criar colunas -->
    <section class="card">
      <h2>Nova Coluna</h2>

      <div class="grid-form">
        <div class="campo">
          <label>Nome da Coluna</label>
          <input type="text" id="columnName" placeholder="Ex: Nome">
        </div>

        <div class="campo">
          <label>Tipo</label>
          <select id="columnType">
            <option value="text">Texto</option>
            <option value="number">Número</option>
            <option value="date">Data</option>
          </select>
        </div>
      </div>

      <button id="addColumnBtn">
        Adicionar Coluna
      </button>
    </section>

    <!-- Formulário -->
    <section class="card">
      <div class="titulo-linha">
        <h2>Adicionar Linha</h2>
      </div>

      <form id="rowForm" class="dynamic-form"></form>

      <button id="addRowBtn">
        Salvar Linha
      </button>
    </section>

    <!-- Tabela -->
    <section class="card tabela-card">
      <div class="titulo-linha">
        <h2>Tabela</h2>

        <button id="clearBtn" class="danger">
          Limpar Tudo
        </button>
      </div>

      <div class="table-wrapper">
        <table id="dataTable">
          <thead>
            <tr id="tableHead"></tr>
          </thead>

          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </section>

  </div>

  <script src="script.js"></script>
</body>
</html>
