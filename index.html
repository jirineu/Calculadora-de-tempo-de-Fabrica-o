<!-- index.html -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Criador de Listas</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <header class="topo">
      <h1>Criador de Listas</h1>
      <p>Crie colunas, adicione linhas e edite dados.</p>
    </header>

    <!-- Criar coluna -->
    <section class="card">

      <h2>Nova Coluna</h2>

      <div class="grid-form">

        <div class="campo">
          <label>Nome da Coluna</label>
          <input type="text" id="columnName" placeholder="Ex: Nome">
        </div>

        <div class="campo">
          <label>Tipo</label>

          <select id="columnType">
            <option value="text">Texto</option>
            <option value="number">Número</option>
            <option value="date">Data</option>
          </select>
        </div>

      </div>

      <button id="addColumnBtn">
        Adicionar Coluna
      </button>

    </section>

    <!-- Inserir linha -->
    <section class="card">

      <h2>Adicionar Linha</h2>

      <form id="rowForm" class="dynamic-form"></form>

      <button id="saveRowBtn">
        Salvar Linha
      </button>

    </section>

    <!-- Excluir -->
    <section class="card">

      <h2>Excluir Linha por ID</h2>

      <div class="delete-box">

        <input
          type="number"
          id="deleteId"
          placeholder="Digite o ID"
        >

        <button id="deleteBtn" class="danger">
          Excluir
        </button>

      </div>

    </section>

    <!-- Tabela -->
    <section class="card">

      <div class="titulo-linha">
        <h2>Tabela</h2>

        <button id="clearBtn" class="danger">
          Limpar Tudo
        </button>
      </div>

      <div class="table-wrapper">

        <table>

          <thead>
            <tr id="tableHead"></tr>
          </thead>

          <tbody id="tableBody"></tbody>

        </table>

      </div>

    </section>

  </div>

  <script src="script.js"></script>
</body>
</html>
