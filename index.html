<!DOCTYPE html>
<html lang="pt-BR">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Criador de Listas</title>

  <link rel="stylesheet" href="style.css">

</head>
<body>

  <div class="container">

    <header class="topo">

      <h1>Criador de Listas</h1>

      <p>
        Crie colunas, adicione linhas, edite e exclua dados.
      </p>

    </header>

<div class="top-actions">

  <button id="openFilterPreviewBtn">
    🔎 Filtrar Visual
  </button>

  <button id="openSmartTabBtn">
    📊 Aba Inteligente
  </button>

</div>

<!-- POPUP FILTRO VISUAL -->
<div id="filterPreviewModal" class="modal">

  <div class="modal-content">

    <h2>Pré-visualização do Filtro</h2>

    <div id="filterPreviewTable"></div>

    <button id="applyFilterBtn">
      Aplicar Filtro
    </button>

    <button id="closeFilterPreviewBtn">
      Fechar
    </button>

  </div>

</div>

<!-- ABA INTELIGENTE -->
<div id="smartModal" class="modal">

  <div class="modal-content">

    <h2>Aba Inteligente (Excel Lite)</h2>

    <select id="smartColumn"></select>

    <select id="smartOperation">
      <option value="sum">SOMA</option>
      <option value="avg">MÉDIA</option>
      <option value="mult">MULTIPLICAÇÃO</option>
      <option value="div">DIVISÃO</option>
      <option value="percent">PORCENTAGEM</option>
    </select>

    <input id="smartValue" placeholder="Valor extra (se necessário)">

    <button id="calcSmartBtn">
      Calcular
    </button>

    <div id="smartResult"></div>

    <button id="closeSmartBtn">
      Fechar
    </button>

  </div>

</div>

    <!-- NOVA COLUNA -->
    <section class="card">

      <h2>Nova Coluna</h2>

      <div class="grid-form">

        <div class="campo">

          <label>Nome da Coluna</label>

          <input
            type="text"
            id="columnName"
            placeholder="Ex: Nome"
          >

        </div>

        <div class="campo">

          <label>Tipo</label>

          <select id="columnType">

            <option value="text">Texto</option>
            <option value="number">Número</option>
            <option value="date">Data</option>

          </select>

        </div>

      </div>

      <button
        type="button"
        id="addColumnBtn"
      >
        Adicionar Coluna
      </button>

    </section>

    <!-- FORMULÁRIO -->
    <section class="card">

      <h2>Adicionar Linha</h2>

      <form id="rowForm" class="dynamic-form"></form>

      <button
        type="button"
        id="saveRowBtn"
      >
        Salvar Linha
      </button>

    </section>

    <!-- EXCLUIR POR ID -->
    <section class="card">

      <h2>Excluir Linha por ID</h2>

      <div class="delete-box">

        <input
          type="number"
          id="deleteId"
          placeholder="Digite o ID"
        >

        <button
          type="button"
          id="deleteBtn"
          class="danger"
        >
          Excluir
        </button>

      </div>

    </section>
<!-- PDF -->
<section class="card">

  <div class="pdf-top">

    <div>

      <h2>Relatórios PDF</h2>

      <p class="pdf-subtitle">
        Gere relatórios filtrados da tabela.
      </p>

    </div>

    <button
      type="button"
      id="openPdfModalBtn"
      class="pdf-btn"
    >

      <span>📄</span>

      Gerar PDF

    </button>

  </div>

</section>


<!-- POPUP PDF -->
<div
  id="pdfModal"
  class="pdf-modal"
>

  <div class="pdf-modal-content">

    <div class="pdf-header">

      <h2>Filtros do PDF</h2>

      <button
        type="button"
        id="closePdfModalBtn"
        class="close-modal-btn"
      >
        ✕
      </button>

    </div>

    <div
      id="pdfFiltersContainer"
      class="pdf-filters-container"
    ></div>

    <div class="pdf-actions">

      <button
        type="button"
        id="addPdfFilterBtn"
        class="secondary-btn"
      >
        + Novo Filtro
      </button>

      <button
        type="button"
        id="generatePdfBtn"
        class="pdf-btn"
      >
        📄 Gerar PDF
      </button>

    </div>

  </div>

</div>

    <!-- TABELA -->
    <section class="card">

      <div class="titulo-linha">

        <h2>Tabela</h2>

        <button
          type="button"
          id="clearBtn"
          class="danger"
        >
          Limpar Tudo
        </button>

      </div>

      <div class="table-wrapper">

        <table>

          <thead>
            <tr id="tableHead"></tr>
          </thead>

          <tbody id="tableBody"></tbody>

        </table>

      </div>

    </section>

  </div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <script src="script.js"></script>

</body>
</html>
